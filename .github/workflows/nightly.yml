name: Nightly Chaos

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  chaos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run chaos tests
        run: npx vitest run 'packages/*/test/chaos'
