<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>reder — command deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* reder — command deck */

      :root {
        --accent: #4f8cff;
        --accent-soft: color-mix(in oklab, var(--accent) 18%, transparent);
        --accent-dim: color-mix(in oklab, var(--accent) 45%, transparent);

        /* status hues */
        --st-waiting: #4f8cff;
        --st-busy: #e0b341;
        --st-idle: #7cd38c;
        --st-offline: #6a6e78;
      }

      /* DARK (default) */
      :root,
      [data-theme='dark'] {
        --bg: #0b0c0f;
        --bg-1: #0f1116;
        --bg-2: #14171e;
        --bg-3: #1a1e27;
        --line: #232733;
        --line-2: #2e3340;
        --fg: #e7e9ef;
        --fg-2: #aeb3c0;
        --fg-3: #7e8595;
        --fg-4: #565c6b;
        --glow: color-mix(in oklab, var(--accent) 35%, #000);
        --bubble-me: #1e2636;
        --bubble-them: #141821;
        --grid-dot: rgba(255, 255, 255, 0.035);
        --noise-op: 0.04;
        color-scheme: dark;
      }

      [data-theme='light'] {
        --bg: #f4f2ee;
        --bg-1: #ecebe5;
        --bg-2: #e4e2db;
        --bg-3: #dcd9d1;
        --line: #c8c5bc;
        --line-2: #b3b0a5;
        --fg: #17181c;
        --fg-2: #3e424c;
        --fg-3: #5c6170;
        --fg-4: #8a8f9c;
        --glow: color-mix(in oklab, var(--accent) 20%, #fff);
        --bubble-me: #dfe6f4;
        --bubble-them: #eceae3;
        --grid-dot: rgba(0, 0, 0, 0.04);
        --noise-op: 0.025;
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        background: var(--bg);
        color: var(--fg);
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
        letter-spacing: -0.005em;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
        color: inherit;
      }
      button {
        background: none;
        border: 0;
        cursor: pointer;
        color: inherit;
      }

      .mono {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
      }
      .serif-it {
        font-family: 'Instrument Serif', serif;
        font-style: italic;
      }

      /* ------------------------ app shell ------------------------ */

      .app {
        height: 100vh;
        display: grid;
        grid-template-columns: 56px 1fr;
        position: relative;
        background:
          radial-gradient(1200px 800px at 80% -10%, var(--accent-soft), transparent 60%),
          linear-gradient(180deg, var(--bg), var(--bg-1));
      }
      .app::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--grid-dot) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-dot) 1px, transparent 1px);
        background-size: 32px 32px;
        pointer-events: none;
        mask-image: radial-gradient(ellipse at 50% 40%, black 40%, transparent 85%);
      }

      /* ------------------------ left rail ------------------------ */

      .rail {
        border-right: 1px solid var(--line);
        background: color-mix(in oklab, var(--bg) 70%, #000);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 12px 0;
        gap: 4px;
        position: relative;
        z-index: 3;
      }
      .rail .mark {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        background: var(--accent);
        display: grid;
        place-items: center;
        color: #0b0c0f;
        font-weight: 800;
        font-family: 'JetBrains Mono';
        margin-bottom: 8px;
        box-shadow:
          0 0 0 1px var(--accent),
          0 0 24px var(--glow);
      }
      .rail-btn {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--fg-3);
        transition:
          background 0.15s,
          color 0.15s;
      }
      .rail-btn:hover {
        background: var(--bg-2);
        color: var(--fg);
      }
      .rail-btn.active {
        background: var(--bg-3);
        color: var(--accent);
        box-shadow: inset 0 0 0 1px var(--line-2);
      }
      .rail .spacer {
        flex: 1;
      }

      /* ------------------------ main area ------------------------ */

      .main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
        min-height: 0;
        position: relative;
      }

      /* topbar */
      .topbar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in oklab, var(--bg) 65%, transparent);
        backdrop-filter: blur(8px);
        position: relative;
        z-index: 2;
      }
      .wordmark {
        font-family: 'JetBrains Mono';
        font-weight: 700;
        font-size: 18px;
        letter-spacing: -0.02em;
        display: flex;
        align-items: baseline;
        gap: 1px;
      }
      .wordmark .caret {
        display: inline-block;
        width: 9px;
        height: 18px;
        background: var(--accent);
        margin-left: 3px;
        animation: blink 1.1s steps(2) infinite;
        transform: translateY(3px);
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      .breadcrumb {
        font-family: 'JetBrains Mono';
        font-size: 12px;
        color: var(--fg-3);
        display: flex;
        align-items: center;
        gap: 10px;
        padding-left: 16px;
        border-left: 1px solid var(--line);
        height: 22px;
      }
      .breadcrumb .k {
        color: var(--fg-4);
      }
      .breadcrumb .v {
        color: var(--fg-2);
      }
      .breadcrumb .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--st-idle);
        box-shadow: 0 0 8px var(--st-idle);
      }

      .topbar .grow {
        flex: 1;
      }

      .search {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg-2);
        width: 280px;
        color: var(--fg-3);
        font-family: 'JetBrains Mono';
        font-size: 12px;
      }
      .search input {
        background: transparent;
        border: 0;
        outline: none;
        flex: 1;
      }
      .search kbd {
        font-family: 'JetBrains Mono';
        font-size: 10px;
        padding: 2px 5px;
        border-radius: 4px;
        border: 1px solid var(--line-2);
        color: var(--fg-3);
        background: var(--bg-1);
      }

      .icon-btn {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        display: grid;
        place-items: center;
        color: var(--fg-3);
      }
      .icon-btn:hover {
        background: var(--bg-2);
        color: var(--fg);
      }

      /* ------------------------ content grid ------------------------ */

      .content {
        display: grid;
        grid-template-columns: 1fr 0px;
        transition: grid-template-columns 0.32s cubic-bezier(0.2, 0.8, 0.2, 1);
        min-height: 0;
        min-width: 0;
        overflow: hidden;
      }
      .content.open {
        grid-template-columns: 1fr min(620px, 46vw);
      }

      .grid-wrap {
        overflow: auto;
        min-width: 0;
        min-height: 0;
        padding: 24px 20px 40px;
      }

      .grid-head {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 16px;
        font-family: 'JetBrains Mono';
        font-size: 12px;
      }
      .grid-head .count {
        color: var(--fg);
        font-weight: 600;
      }
      .grid-head .count em {
        color: var(--fg-4);
        font-style: normal;
        font-weight: 400;
      }
      .grid-head .sep {
        width: 1px;
        height: 14px;
        background: var(--line);
      }
      .grid-head .chips {
        display: flex;
        gap: 6px;
      }
      .chip {
        padding: 3px 9px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--fg-3);
        font-size: 11px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--bg-1);
        transition: all 0.15s;
      }
      .chip:hover {
        color: var(--fg);
        border-color: var(--line-2);
      }
      .chip.on {
        color: var(--fg);
        border-color: var(--accent);
        background: color-mix(in oklab, var(--accent) 10%, transparent);
      }
      .chip .swatch {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }

      .grid-head .grow {
        flex: 1;
      }

      .sort {
        display: flex;
        gap: 2px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 2px;
      }
      .sort button {
        padding: 3px 8px;
        font-size: 11px;
        color: var(--fg-3);
        border-radius: 4px;
      }
      .sort button.on {
        background: var(--bg-3);
        color: var(--fg);
      }

      .cols-slider {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--fg-3);
        background: var(--bg-1);
      }
      .cols-slider input[type='range'] {
        -webkit-appearance: none;
        appearance: none;
        width: 110px;
        height: 3px;
        background: var(--bg-3);
        border-radius: 999px;
        outline: none;
        margin: 0;
      }
      .cols-slider input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        box-shadow:
          0 0 0 2px var(--bg-1),
          0 0 0 3px var(--accent-dim);
      }
      .cols-slider input[type='range']::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 0;
        background: var(--accent);
        cursor: pointer;
        box-shadow:
          0 0 0 2px var(--bg-1),
          0 0 0 3px var(--accent-dim);
      }
      .cols-slider .cols-val {
        color: var(--fg);
        font-size: 11px;
        min-width: 10px;
        text-align: center;
      }

      /* ------------------------ grid ------------------------ */

      .sessions {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(var(--cols, 3), minmax(0, 1fr));
      }

      /* card: tactical */
      .card {
        background: var(--bg-1);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 16px;
        position: relative;
        cursor: pointer;
        transition:
          border-color 0.18s,
          transform 0.18s,
          background 0.18s;
        overflow: hidden;
        min-height: 170px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        container-type: inline-size;
        container-name: card;
      }
      .card:hover {
        border-color: var(--line-2);
        background: var(--bg-2);
      }
      .card.selected {
        border-color: var(--accent);
        box-shadow:
          0 0 0 1px var(--accent),
          0 0 32px -8px var(--glow);
      }

      .card-top {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .card-top .spill {
        margin-left: auto;
      }

      /* narrow: stack status pill under name */
      @container card (max-width: 210px) {
        .card-top {
          gap: 8px;
        }
        .card-top .spill {
          margin-left: 0;
          flex-basis: 100%;
          width: fit-content;
        }
        .card-name .n {
          font-size: 13px;
        }
        .card {
          padding: 14px;
          min-height: 160px;
        }
      }

      /* very narrow: drop meta, stack vertically */
      @container card (max-width: 170px) {
        .avatar {
          width: 32px;
          height: 32px;
          font-size: 11px;
        }
        .card-meta {
          grid-template-columns: 1fr;
          gap: 2px;
        }
        .card-meta > div:nth-child(n + 3) {
          display: none;
        }
        .card-preview {
          -webkit-line-clamp: 3;
          min-height: 0;
          font-size: 12.5px;
        }
      }

      /* extremely narrow: hide meta entirely */
      @container card (max-width: 140px) {
        .card-meta {
          display: none;
        }
        .card {
          min-height: 140px;
          padding: 12px;
        }
        .card-name .id {
          display: none;
        }
        .card-preview {
          -webkit-line-clamp: 4;
          font-size: 12px;
        }
      }
      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-family: 'JetBrains Mono';
        font-weight: 700;
        font-size: 13px;
        color: #0b0c0f;
        flex-shrink: 0;
        position: relative;
      }
      .avatar::after {
        content: '';
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        border: 1px solid var(--line);
        pointer-events: none;
      }

      .card-name {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .card-name .n {
        font-weight: 600;
        font-size: 14px;
        letter-spacing: -0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-name .id {
        font-family: 'JetBrains Mono';
        font-size: 11px;
        color: var(--fg-4);
      }

      .card-preview {
        font-size: 13px;
        color: var(--fg-2);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        min-height: 2.9em;
      }
      .card-preview .pfx {
        font-family: 'JetBrains Mono';
        color: var(--fg-4);
        font-size: 11px;
        margin-right: 6px;
      }

      .card-meta {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 4px 8px;
        font-family: 'JetBrains Mono';
        font-size: 10.5px;
        color: var(--fg-3);
        margin-top: auto;
        padding-top: 10px;
        border-top: 1px dashed var(--line);
      }
      .card-meta .k {
        color: var(--fg-4);
        display: block;
        font-size: 9.5px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 2px;
      }
      .card-meta .v {
        color: var(--fg-2);
      }

      /* status indicator: variant A — ringed avatar */
      .avatar-wrap {
        position: relative;
        flex-shrink: 0;
      }
      .status-ring {
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        pointer-events: none;
      }

      [data-status='waiting'] .status-ring {
        border: 1.5px solid var(--st-waiting);
        animation: pulse-ring 1.6s ease-out infinite;
      }
      [data-status='busy'] .status-ring {
        border: 1.5px solid var(--st-busy);
      }
      [data-status='idle'] .status-ring {
        border: 1.5px dashed var(--st-idle);
      }
      [data-status='offline'] .status-ring {
        border: 1.5px dashed var(--line-2);
        opacity: 0.6;
      }
      @keyframes pulse-ring {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(1.35);
          opacity: 0;
        }
      }

      /* small status pill */
      .spill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: 'JetBrains Mono';
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--fg-3);
        padding: 3px 8px;
        border-radius: 4px;
        background: var(--bg-2);
        border: 1px solid var(--line);
      }
      .spill .d {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .spill[data-s='waiting'] .d {
        background: var(--st-waiting);
        box-shadow: 0 0 6px var(--st-waiting);
        animation: dot-blink 1.2s infinite;
      }
      .spill[data-s='busy'] .d {
        background: var(--st-busy);
        animation: dot-blink 0.6s infinite;
      }
      .spill[data-s='idle'] .d {
        background: var(--st-idle);
      }
      .spill[data-s='offline'] .d {
        background: var(--st-offline);
      }

      .spill[data-s='waiting'] {
        color: var(--st-waiting);
        border-color: color-mix(in oklab, var(--st-waiting) 40%, var(--line));
      }
      .spill[data-s='busy'] {
        color: var(--st-busy);
        border-color: color-mix(in oklab, var(--st-busy) 40%, var(--line));
      }
      .spill[data-s='idle'] {
        color: var(--st-idle);
      }
      .spill[data-s='offline'] {
        color: var(--fg-4);
      }

      @keyframes dot-blink {
        50% {
          opacity: 0.25;
        }
      }

      /* scan bar for busy */
      .scanbar {
        height: 2px;
        background: var(--line);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 6px;
        position: relative;
      }
      .scanbar::after {
        content: '';
        position: absolute;
        inset: 0;
        width: 40%;
        background: linear-gradient(90deg, transparent, var(--st-busy), transparent);
        animation: scan 1.6s linear infinite;
      }
      @keyframes scan {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(350%);
        }
      }

      /* waveform for waiting */
      .waveform {
        display: inline-flex;
        align-items: flex-end;
        gap: 2px;
        height: 12px;
      }
      .waveform span {
        width: 2px;
        background: var(--st-waiting);
        border-radius: 1px;
        animation: wave 1s ease-in-out infinite;
      }
      .waveform span:nth-child(1) {
        animation-delay: 0s;
        height: 30%;
      }
      .waveform span:nth-child(2) {
        animation-delay: 0.1s;
        height: 60%;
      }
      .waveform span:nth-child(3) {
        animation-delay: 0.2s;
        height: 90%;
      }
      .waveform span:nth-child(4) {
        animation-delay: 0.3s;
        height: 45%;
      }
      .waveform span:nth-child(5) {
        animation-delay: 0.4s;
        height: 75%;
      }
      @keyframes wave {
        0%,
        100% {
          transform: scaleY(0.4);
        }
        50% {
          transform: scaleY(1);
        }
      }

      /* ---------- card variant: COMPACT ---------- */
      .sessions.v-compact .card {
        min-height: 72px;
        padding: 10px 12px;
        flex-direction: row;
        align-items: center;
        gap: 12px;
      }
      .sessions.v-compact .card-top {
        flex: 1;
        min-width: 0;
      }
      .sessions.v-compact .card-preview,
      .sessions.v-compact .card-meta {
        display: none;
      }
      .sessions.v-compact .card .spill {
        margin-left: auto;
      }

      /* ---------- card variant: PANEL (display-forward) ---------- */
      .sessions.v-panel .card {
        background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
        min-height: 180px;
        padding: 0;
        overflow: hidden;
      }
      .sessions.v-panel .card-top {
        padding: 12px 14px;
        background: var(--bg);
        border-bottom: 1px solid var(--line);
      }
      .sessions.v-panel .card-preview {
        padding: 0 14px;
        margin-top: 2px;
        flex: 1;
      }
      .sessions.v-panel .card-meta {
        grid-template-columns: repeat(4, 1fr);
        padding: 10px 14px;
        margin: 0;
        border-top: 1px solid var(--line);
        background: color-mix(in oklab, var(--bg) 70%, #000);
      }
      [data-theme='light'] .sessions.v-panel .card-meta {
        background: color-mix(in oklab, var(--bg) 85%, #000);
      }

      /* scrollbars */
      *::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      *::-webkit-scrollbar-track {
        background: transparent;
      }
      *::-webkit-scrollbar-thumb {
        background: var(--line);
        border: 3px solid transparent;
        background-clip: padding-box;
        border-radius: 10px;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: var(--line-2);
        background-clip: padding-box;
        border: 3px solid transparent;
      }

      /* ------------------------ side panel ------------------------ */

      .panel {
        border-left: 1px solid var(--line);
        background: var(--bg);
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 0;
        min-width: 0;
        overflow: hidden;
        position: relative;
      }

      .panel-head {
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 12px;
        background: color-mix(in oklab, var(--bg) 50%, var(--bg-1));
      }
      .panel-head .avatar-wrap {
        transform: scale(0.92);
      }
      .panel-head .meta {
        flex: 1;
        min-width: 0;
      }
      .panel-head .meta .n {
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .panel-head .meta .sub {
        font-family: 'JetBrains Mono';
        font-size: 11px;
        color: var(--fg-3);
        display: flex;
        gap: 10px;
        margin-top: 2px;
      }
      .panel-head .meta .sub b {
        color: var(--fg-2);
        font-weight: 500;
      }
      .panel-head .actions {
        display: flex;
        gap: 2px;
      }

      .stream {
        overflow-y: auto;
        padding: 20px 18px 10px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        background:
          linear-gradient(180deg, var(--bg), var(--bg-1)),
          repeating-linear-gradient(180deg, transparent 0 3px, rgba(255, 255, 255, 0.008) 3px 4px);
      }

      .day-sep {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: 'JetBrains Mono';
        font-size: 10px;
        color: var(--fg-4);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin: 6px 0 2px;
      }
      .day-sep::before,
      .day-sep::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--line);
      }

      .msg {
        display: flex;
        flex-direction: column;
        max-width: 88%;
        gap: 4px;
      }
      .msg.them {
        align-self: flex-start;
      }
      .msg.me {
        align-self: flex-end;
        align-items: flex-end;
      }
      .msg .who {
        font-family: 'JetBrains Mono';
        font-size: 10.5px;
        color: var(--fg-4);
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .msg .who b {
        color: var(--fg-2);
        font-weight: 500;
      }
      .msg .bubble {
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 13.5px;
        line-height: 1.55;
        position: relative;
        max-width: 100%;
        word-wrap: break-word;
      }
      .msg.them .bubble {
        background: var(--bubble-them);
        border: 1px solid var(--line);
        border-top-left-radius: 3px;
      }
      .msg.me .bubble {
        background: var(--bubble-me);
        border: 1px solid color-mix(in oklab, var(--accent) 25%, var(--line));
        border-top-right-radius: 3px;
      }

      /* bubble variant: terminal — mono, no background, left rule */
      .stream.b-terminal .msg .bubble {
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0 0 0 12px;
        border-left: 2px solid var(--line);
        font-family: 'JetBrains Mono';
        font-size: 12.5px;
      }
      .stream.b-terminal .msg.me .bubble {
        border-left-color: var(--accent);
      }

      /* bubble variant: minimal — just text, no box */
      .stream.b-minimal .msg .bubble {
        background: transparent;
        border: 0;
        padding: 0;
        border-radius: 0;
      }
      .stream.b-minimal .msg.me .bubble {
        color: var(--accent);
      }

      /* markdown basics */
      .bubble p {
        margin: 0 0 6px;
      }
      .bubble p:last-child {
        margin: 0;
      }
      .bubble code {
        font-family: 'JetBrains Mono';
        font-size: 0.92em;
        background: color-mix(in oklab, var(--bg) 50%, #000);
        padding: 1px 5px;
        border-radius: 4px;
        border: 1px solid var(--line);
      }
      [data-theme='light'] .bubble code {
        background: color-mix(in oklab, var(--bg) 70%, #000);
      }
      .bubble pre {
        margin: 8px 0;
        padding: 10px 12px;
        background: color-mix(in oklab, var(--bg) 50%, #000);
        border: 1px solid var(--line);
        border-radius: 6px;
        overflow-x: auto;
        font-family: 'JetBrains Mono';
        font-size: 12px;
      }
      [data-theme='light'] .bubble pre {
        background: color-mix(in oklab, var(--bg) 80%, #000);
      }
      .bubble pre code {
        background: none;
        border: 0;
        padding: 0;
      }
      .bubble ul,
      .bubble ol {
        margin: 6px 0;
        padding-left: 20px;
      }
      .bubble li {
        margin: 2px 0;
      }
      .bubble a {
        color: var(--accent);
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .bubble strong {
        font-weight: 600;
      }
      .bubble em {
        font-style: italic;
      }
      .bubble blockquote {
        margin: 6px 0;
        padding: 2px 10px;
        border-left: 2px solid var(--accent);
        color: var(--fg-2);
      }
      .bubble h1,
      .bubble h2,
      .bubble h3 {
        margin: 10px 0 4px;
        font-size: 1em;
        font-weight: 700;
      }

      .activity-line {
        align-self: center;
        font-family: 'JetBrains Mono';
        font-size: 10.5px;
        color: var(--fg-4);
        padding: 2px 8px;
        border-radius: 4px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .activity-line::before {
        content: '→';
        color: var(--accent);
      }

      /* quick reply buttons (Telegram-style) */
      .quick-replies {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }
      .quick-replies.answered {
        font-family: 'JetBrains Mono';
        font-size: 11px;
        color: var(--fg-4);
        padding: 4px 10px;
        background: transparent;
        border-left: 2px solid var(--line-2);
        margin-top: 6px;
      }
      .quick-replies.answered .mono {
        color: var(--fg-4);
      }
      .quick-replies.answered b {
        color: var(--fg-2);
        font-weight: 500;
      }

      .qbtn {
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid var(--line-2);
        background: var(--bg-2);
        color: var(--fg);
        font-size: 12.5px;
        font-weight: 500;
        transition: all 0.15s;
        cursor: pointer;
        letter-spacing: -0.005em;
      }
      .qbtn:hover {
        border-color: var(--accent);
        background: color-mix(in oklab, var(--accent) 10%, var(--bg-2));
        color: var(--fg);
        transform: translateY(-1px);
      }
      .qbtn:active {
        transform: translateY(0);
      }
      .qbtn.primary {
        background: color-mix(in oklab, var(--accent) 18%, var(--bg-2));
        border-color: var(--accent);
        color: var(--accent);
      }
      .qbtn.primary:hover {
        background: var(--accent);
        color: #0b0c0f;
      }
      .qbtn.danger {
        border-color: color-mix(in oklab, #ff6b6b 40%, var(--line-2));
        color: #ff8a8a;
      }
      .qbtn.danger:hover {
        background: color-mix(in oklab, #ff6b6b 15%, var(--bg-2));
        border-color: #ff6b6b;
        color: #ff6b6b;
      }
      [data-theme='light'] .qbtn.danger {
        color: #cc3a3a;
      }
      [data-theme='light'] .qbtn.danger:hover {
        color: #b62e2e;
      }

      /* ------------------------ composer ------------------------ */

      .composer {
        border-top: 1px solid var(--line);
        padding: 12px;
        background: color-mix(in oklab, var(--bg) 60%, var(--bg-1));
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .composer-box {
        background: var(--bg-2);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 10px;
        display: flex;
        align-items: flex-end;
        gap: 8px;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .composer-box:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      .composer textarea {
        flex: 1;
        background: transparent;
        border: 0;
        outline: none;
        resize: none;
        font-family: 'Inter', sans-serif;
        font-size: 13.5px;
        color: var(--fg);
        padding: 6px 4px;
        min-height: 22px;
        max-height: 160px;
        line-height: 1.5;
      }
      .composer textarea::placeholder {
        color: var(--fg-4);
      }

      .composer .tools {
        display: flex;
        gap: 2px;
        align-items: center;
      }
      .composer .ibtn {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        display: grid;
        place-items: center;
        color: var(--fg-3);
      }
      .composer .ibtn:hover {
        background: var(--bg-3);
        color: var(--fg);
      }
      .composer .ibtn.active {
        color: var(--accent);
        background: color-mix(in oklab, var(--accent) 12%, transparent);
      }

      .send {
        height: 30px;
        padding: 0 12px;
        border-radius: 6px;
        background: var(--accent);
        color: #0b0c0f;
        font-family: 'JetBrains Mono';
        font-weight: 600;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: filter 0.15s;
      }
      .send:hover {
        filter: brightness(1.08);
      }
      .send:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .hint {
        display: flex;
        justify-content: space-between;
        font-family: 'JetBrains Mono';
        font-size: 10.5px;
        color: var(--fg-4);
        padding: 0 4px;
      }
      .hint kbd {
        font-family: inherit;
        font-size: 10px;
        padding: 1px 4px;
        border-radius: 3px;
        border: 1px solid var(--line);
        color: var(--fg-3);
        background: var(--bg-1);
      }

      /* attachment */
      .attach-strip {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        padding: 0 2px;
      }
      .attach {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--bg-1);
        font-family: 'JetBrains Mono';
        font-size: 11px;
        color: var(--fg-2);
      }
      .attach .x {
        color: var(--fg-4);
        cursor: pointer;
      }
      .attach .x:hover {
        color: var(--fg);
      }

      /* speaking mode — inline (no overlay) */
      .composer.is-speaking .composer-box {
        border-color: var(--accent);
        box-shadow:
          0 0 0 3px var(--accent-soft),
          inset 0 0 0 0 transparent;
        background: color-mix(in oklab, var(--accent) 6%, var(--bg-2));
      }
      .composer.is-speaking textarea {
        caret-color: transparent;
      }
      .composer .speaking-hint {
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .composer .speaking-hint .rec-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
        animation: dot-blink 1s infinite;
      }

      /* morphed send slot: waveform button */
      .send.speaking {
        background: color-mix(in oklab, var(--accent) 18%, var(--bg-2));
        color: var(--accent);
        border: 1px solid var(--accent);
        padding: 0 12px;
        gap: 8px;
        height: 30px;
        min-width: 96px;
        justify-content: center;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 10.5px;
      }
      .send.speaking.pending {
        background: var(--accent);
        color: #0b0c0f;
      }
      .send.speaking .lbl {
        font-family: 'JetBrains Mono';
        font-weight: 600;
      }

      .live-wave {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        height: 16px;
      }
      .live-wave span {
        width: 2px;
        background: currentColor;
        border-radius: 2px;
        animation: vwave 0.85s ease-in-out infinite;
        min-height: 3px;
      }
      @keyframes vwave {
        0%,
        100% {
          height: 20%;
        }
        50% {
          height: 85%;
        }
      }

      /* ------------------------ composer variants ------------------------ */

      /* c-segmented: separated buttons with labels */
      .composer.c-segmented .composer-box {
        padding: 0;
        flex-direction: column;
        align-items: stretch;
        gap: 0;
      }
      .composer.c-segmented textarea {
        padding: 12px 14px;
      }
      .composer.c-segmented .bar {
        display: flex;
        align-items: center;
        padding: 6px 8px;
        border-top: 1px solid var(--line);
        gap: 4px;
      }
      .composer.c-segmented .bar .ibtn {
        width: auto;
        padding: 0 10px;
        gap: 6px;
        font-family: 'JetBrains Mono';
        font-size: 11px;
      }
      .composer.c-segmented .spacer {
        flex: 1;
      }

      /* c-minimal: just an input line, mono */
      .composer.c-minimal .composer-box {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-radius: 0;
        padding: 8px 12px;
      }
      .composer.c-minimal textarea {
        font-family: 'JetBrains Mono';
        font-size: 12.5px;
      }
      .composer.c-minimal .hint {
        display: none;
      }

      /* ------------------------ panel variants ------------------------ */

      /* panel-overlay: doesn't push, floats */
      .content.open.p-overlay {
        grid-template-columns: 1fr 0;
      }
      .content.p-overlay .panel {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: min(620px, 60%);
        box-shadow: -30px 0 60px -10px #000;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      [data-theme='light'] .content.p-overlay .panel {
        box-shadow: -30px 0 60px -10px rgba(0, 0, 0, 0.15);
      }
      .content.open.p-overlay .panel {
        transform: translateX(0);
      }

      /* panel-takeover: full width */
      .content.open.p-takeover {
        grid-template-columns: 0 1fr;
      }
      .content.p-takeover .grid-wrap {
        display: none;
      }

      /* ------------------------ tweaks panel ------------------------ */

      .tweaks-scrim {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(1.5px);
        z-index: 99;
        animation: scrimIn 0.18s ease;
      }
      [data-theme='light'] .tweaks-scrim {
        background: rgba(20, 20, 25, 0.2);
      }
      @keyframes scrimIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .tweaks {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 300px;
        max-height: 82vh;
        background: var(--bg);
        border: 1px solid var(--accent);
        border-radius: 12px;
        box-shadow:
          0 0 0 1px var(--accent),
          0 0 40px -8px var(--glow),
          0 30px 60px -10px rgba(0, 0, 0, 0.6),
          inset 0 1px 0 color-mix(in oklab, var(--accent) 30%, transparent);
        z-index: 100;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
        animation: tweakIn 0.22s cubic-bezier(0.2, 0.9, 0.3, 1.1);
      }
      [data-theme='light'] .tweaks {
        box-shadow:
          0 0 0 1px var(--accent),
          0 0 32px -6px color-mix(in oklab, var(--accent) 35%, transparent),
          0 30px 60px -10px rgba(0, 0, 0, 0.25);
      }
      @keyframes tweakIn {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      /* accent top bar */
      .tweaks::before {
        content: '';
        display: block;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--accent),
          color-mix(in oklab, var(--accent) 50%, transparent)
        );
      }

      .tweaks-head {
        padding: 12px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in oklab, var(--accent) 8%, var(--bg-1));
        color: var(--accent);
      }
      .tweaks-head .t {
        font-family: 'JetBrains Mono';
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        flex: 1;
        color: var(--accent);
      }
      .tweaks-head .live-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
        animation: dot-blink 1.6s infinite;
      }

      .tweaks-body {
        padding: 14px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        background: var(--bg-1);
      }
      .tweak-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .tweak-row .label {
        font-family: 'JetBrains Mono';
        font-size: 10px;
        color: var(--fg-3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        display: flex;
        justify-content: space-between;
      }
      .tweak-row .label b {
        color: var(--fg);
        font-weight: 600;
      }

      .segmented {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: 1fr;
        background: var(--bg-2);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 2px;
      }
      .segmented button {
        padding: 5px 6px;
        font-family: 'JetBrains Mono';
        font-size: 10.5px;
        color: var(--fg-3);
        border-radius: 4px;
      }
      .segmented button.on {
        background: var(--bg-3);
        color: var(--fg);
        box-shadow: inset 0 0 0 1px var(--line-2);
      }

      .swatches {
        display: flex;
        gap: 6px;
      }
      .swatches button {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid var(--bg-1);
        outline: 1px solid var(--line);
        transition: outline-color 0.15s;
      }
      .swatches button.on {
        outline-color: var(--fg);
        outline-width: 2px;
      }

      input[type='range'].rng {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        background: var(--bg-3);
        border-radius: 999px;
        outline: none;
      }
      input[type='range'].rng::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        box-shadow:
          0 0 0 3px var(--bg-1),
          0 0 0 4px var(--accent-dim);
      }

      /* close btn */
      .x-btn {
        color: var(--fg-4);
        width: 22px;
        height: 22px;
        border-radius: 4px;
        display: grid;
        place-items: center;
      }
      .x-btn:hover {
        background: var(--bg-3);
        color: var(--fg);
      }

      /* utility */
      .sr {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // Tweakable defaults — host can persist via __edit_mode_set_keys
      window.TWEAKS = /*EDITMODE-BEGIN*/ {
        theme: 'dark',
        accent: '#b281ff',
        cardVariant: 'tactical',
        statusVariant: 'ringed',
        bubbleVariant: 'classic',
        composerVariant: 'rail',
        panelVariant: 'push',
        gridDensity: 3,
      } /*EDITMODE-END*/;
    </script>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="src/data.jsx"></script>
    <script type="text/babel" src="src/markdown.jsx"></script>
    <script type="text/babel" src="src/icons.jsx"></script>
    <script type="text/babel" src="src/status.jsx"></script>
    <script type="text/babel" src="src/card.jsx"></script>
    <script type="text/babel" src="src/composer.jsx"></script>
    <script type="text/babel" src="src/panel.jsx"></script>
    <script type="text/babel" src="src/tweaks.jsx"></script>
    <script type="text/babel" src="src/app.jsx"></script>
  </body>
</html>
